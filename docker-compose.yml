services:
  postgres:
    image: postgres:16-alpine
    container_name: arbidex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arbidex
      POSTGRES_PASSWORD: arbidex_pass
      POSTGRES_DB: arbidex_db
    command: -p 5433
    ports:
      - '5433:5433'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arbidex -d arbidex_db -p 5433']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./arbi-dex-server
      dockerfile: Dockerfile
    container_name: arbidex_server
    restart: unless-stopped
    ports:
      - '3006:3006'
    environment:
      APP_PORT: 3006
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5433
      DB_USER: arbidex
      DB_PASSWORD: arbidex_pass
      DB_NAME: arbidex_db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super-secret-access-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: '*'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./arbi-dex
      dockerfile: Dockerfile
    container_name: arbidex_frontend
    restart: unless-stopped
    ports:
      - '8231:80'
    environment:
      API_BASE_URL: http://45.135.182.251:3006/api
    depends_on:
      - server

volumes:
  postgres_data:


